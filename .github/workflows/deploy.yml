name: Deploy Static Website to GitHub Pages

on:
  # Запускается при каждом push-запросе в ветку main (или master)
  push:
    branches: ["main", "master"]
  # Позволяет запускать сборку вручную из интерфейса GitHub
  workflow_dispatch:

# Устанавливаем права доступа для деплоя
permissions:
  contents: read
  pages: write
  id-token: write

# Отменяем старые сборки, если прилетел новый коммит
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown

      - name: Build Blog Posts
        run: python build.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Загружаем всё содержимое репозитория
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
